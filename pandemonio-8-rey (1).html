// Frames genéricos para las demás cartas (canvas generado)
var INTRO_FRAMES_DEFAULT = (function() {
  function makeFrame(bg, lines) {
    var c = document.createElement('canvas');
    c.width = 120; c.height = 160;
    var ctx = c.getContext('2d');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, 120, 160);
    if (lines) lines(ctx);
    return c.toDataURL();
  }
  var frames = [];
  for (var i = 0; i < 3; i++) frames.push(makeFrame('#000'));
  frames.push(makeFrame('#fff'));
  frames.push(makeFrame('#eee'));
  frames.push(makeFrame('#111', function(ctx) {
    ctx.fillStyle = '#fff';
    for (var p = 0; p < 18; p++) ctx.fillRect(Math.random()*120|0, Math.random()*160|0, 2, 2);
  }));
  frames.push(makeFrame('#1a1a2e', function(ctx) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (var p = 0; p < 30; p++) ctx.fillRect(Math.random()*120|0, Math.random()*160|0, 2+(Math.random()*2|0), 2);
    ctx.fillStyle = 'rgba(76,201,240,0.15)';
    for (var y = 0; y < 160; y += 8) ctx.fillRect(0, y, 120, 2);
  }));
  frames.push(makeFrame('#0e0e18', function(ctx) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (var p = 0; p < 20; p++) ctx.fillRect(Math.random()*120|0, Math.random()*160|0, 2, 2+(Math.random()*4|0));
    ctx.fillStyle = 'rgba(76,201,240,0.25)';
    for (var y = 0; y < 160; y += 6) ctx.fillRect(0, y, 120, 1);
  }));
  frames.push(makeFrame('#08080d', function(ctx) {
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(15, 10, 90, 140);
    ctx.fillStyle = 'rgba(76,201,240,0.3)';
    for (var y = 0; y < 160; y += 5) ctx.fillRect(0, y, 120, 1);
  }));
  frames.push(makeFrame('#08080d', function(ctx) {
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(10, 5, 100, 150);
    ctx.fillStyle = 'rgba(76,201,240,0.15)';
    for (var y = 0; y < 160; y += 4) ctx.fillRect(0, y, 120, 1);
  }));
  frames.push(null);
  return frames;
})();

function getIntroFrames(cardName) {
  if (cardName === 'Giga Morror') return INTRO_FRAMES_GIGA_MORROR;
  if (cardName === 'Raka') return INTRO_FRAMES_RAKA;
  if (cardName === 'Moyors') return INTRO_FRAMES_MOYORS;
  if (cardName === 'Carno Plant') return INTRO_FRAMES_CARNO_PLANT;
  return INTRO_FRAMES_DEFAULT;
}

var INTRO_FRAME_MS = 140;
var INTRO_FRAME_MS_BY_CARD = {
  'Giga Morror': 90,
  'Moyors': 110,
  'Carno Plant': 110
};

function playIntroAnim(overlayId, imgId, cardName, onDone) {
  var frames  = getIntroFrames(cardName);
  var ms      = INTRO_FRAME_MS_BY_CARD[cardName] || INTRO_FRAME_MS;
  var img     = document.getElementById(imgId);
  var overlay = document.getElementById(overlayId);
  // La carta queda visible todo el tiempo, la animación corre encima
  overlay.classList.add('playing');
  var frame = 0;
  function nextFrame() {
    if (frame >= frames.length) {
      overlay.classList.remove('playing');
      overlay.style.backgroundImage = '';
      if (onDone) onDone();
      return;
    }
    var f = frames[frame];
    if (f === null) {
      overlay.classList.remove('playing');
      overlay.style.backgroundImage = '';
      if (onDone) onDone();
      return;
    }
    overlay.style.backgroundImage = 'url(' + f + ')';
    frame++;
    setTimeout(nextFrame, ms);
  }
  nextFrame();
}

// ─── SISTEMA DE COLA GLOBAL POR LADO ───────────────────
// hit-left y heal-left comparten la misma cola ("left")
// hit-right y heal-right comparten la misma cola ("right")
// Así nunca se superponen animaciones en la misma carta.
var _sideQueues = { left: [], right: [] };
var _sideRunning = { left: false, right: false };

function _getSide(overlayId) {
  // overlayId es "hit-left", "heal-left", "hit-right", "heal-right"
  return overlayId.endsWith('-left') ? 'left' : 'right';
}

function _runSideQueue(side) {
  if (_sideRunning[side]) return;
  var queue = _sideQueues[side];
  if (!queue || queue.length === 0) return;
  _sideRunning[side] = true;
  var job = queue.shift();
  var overlay = document.getElementById(job.overlayId);
  if (!overlay) { _sideRunning[side] = false; _runSideQueue(side); return; }

  overlay.classList.add('playing');
  var frame = 0;
  function nextFrame() {
    if (frame >= job.frames.length) {
      overlay.classList.remove('playing');
      overlay.style.backgroundImage = '';
      _sideRunning[side] = false;
      _runSideQueue(side);
      return;
    }
    overlay.style.backgroundImage = 'url(' + job.frames[frame] + ')';
    frame++;
    setTimeout(nextFrame, job.ms);
  }
  nextFrame();
}

function _enqueueSideAnim(overlayId, frames, ms) {
  var side = _getSide(overlayId);
  _sideQueues[side].push({ overlayId: overlayId, frames: frames, ms: ms });
  _runSideQueue(side);
}

// ─── SONIDO: VICTORIA (trompeta triunfal) ──────────────
function playVictorySound() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var t = ctx.currentTime;
    // Fanfarria: Sol - Do - Mi - Sol (acorde ascendente con ornamento)
    var melody = [
      { freq: 392, start: 0,    dur: 0.12 },   // Sol
      { freq: 523, start: 0.13, dur: 0.12 },   // Do
      { freq: 659, start: 0.26, dur: 0.12 },   // Mi
      { freq: 784, start: 0.39, dur: 0.35 },   // Sol (sostenido)
      { freq: 880, start: 0.55, dur: 0.45 },   // La (brillo final)
    ];
    melody.forEach(function(n) {
      var osc = ctx.createOscillator(); osc.type = 'square';
      osc.frequency.setValueAtTime(n.freq, t + n.start);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.0, t + n.start);
      g.gain.linearRampToValueAtTime(0.65, t + n.start + 0.025);
      g.gain.exponentialRampToValueAtTime(0.001, t + n.start + n.dur);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t + n.start); osc.stop(t + n.start + n.dur + 0.05);
    });
    // Sub grave bajo la fanfarria
    var sub = ctx.createOscillator(); sub.type = 'sine';
    sub.frequency.setValueAtTime(98, t + 0.39);
    var subG = ctx.createGain();
    subG.gain.setValueAtTime(0.78, t + 0.39);
    subG.gain.exponentialRampToValueAtTime(0.001, t + 1.1);
    sub.connect(subG); subG.connect(ctx.destination);
    sub.start(t + 0.39); sub.stop(t + 1.15);
    setTimeout(() => ctx.close(), 2000);
  } catch(e) {}
}

// ─── SONIDO: DERROTA (trompeta triste, solo 1P) ─────────
function playDefeatSound() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var t = ctx.currentTime;
    // Melodía descendente triste: Sol - Mi - Re - Do
    var melody = [
      { freq: 784, start: 0,    dur: 0.25 },   // Sol
      { freq: 659, start: 0.28, dur: 0.25 },   // Mi
      { freq: 587, start: 0.56, dur: 0.25 },   // Re
      { freq: 523, start: 0.84, dur: 0.55 },   // Do (largo, apagado)
    ];
    melody.forEach(function(n) {
      var osc = ctx.createOscillator(); osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(n.freq, t + n.start);
      osc.frequency.exponentialRampToValueAtTime(n.freq * 0.96, t + n.start + n.dur);
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.0, t + n.start);
      g.gain.linearRampToValueAtTime(0.455, t + n.start + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + n.start + n.dur);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t + n.start); osc.stop(t + n.start + n.dur + 0.05);
    });
    setTimeout(() => ctx.close(), 2200);
  } catch(e) {}

// ─── HELPER: lanza animación de cura sobre la carta indicada ───
// ─── SONIDO: CURACIÓN ──────────────────────────────────
function playHealSound() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var t = ctx.currentTime;

    // Acorde ascendente de tres tonos (sensación de recuperación)
    var notes = [523, 659, 784]; // Do, Mi, Sol (acorde mayor)
    notes.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + i * 0.07);
      osc.frequency.setValueAtTime(freq * 1.01, t + i * 0.07 + 0.04); // leve vibrato al final
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.0, t + i * 0.07);
      g.gain.linearRampToValueAtTime(0.715, t + i * 0.07 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.32);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t + i * 0.07);
      osc.stop(t + i * 0.07 + 0.35);
    });

    // Brillo mágico: ruido filtrado agudo y suave
    var bufLen = ctx.sampleRate * 0.3;
    var buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufLen, 1.2);
    var src = ctx.createBufferSource(); src.buffer = buf;
    var hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 4500;
    var sparkGain = ctx.createGain();
    sparkGain.gain.setValueAtTime(0.286, t);
    sparkGain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    src.connect(hp); hp.connect(sparkGain); sparkGain.connect(ctx.destination);
    src.start(t);

    setTimeout(() => ctx.close(), 900);
  } catch(e) {}
}

function triggerHealAnim(card) {
  var overlayId = card === G.player ? 'heal-left' : 'heal-right';
  playHealAnim(overlayId);
  playHealSound();
}

// ─── DEATH ANIMATION ───────────────────────────────────
var DEATH_FRAME_MS = 175; // ~6fps

function playDeathAnim(overlayId, imgId, onDone) {
  playGlassBreak();
  var img = document.getElementById(imgId);
  var overlay = document.getElementById(overlayId);
  // Ocultar la imagen de la carta
  if (img) img.style.visibility = 'hidden';
  overlay.classList.add('playing');
  var frame = 0;
  function nextFrame() {
    if (frame >= DEATH_FRAMES.length) {
      overlay.classList.remove('playing');
      overlay.style.backgroundImage = '';
      if (onDone) onDone();
      return;
    }
    overlay.style.backgroundImage = 'url(' + DEATH_FRAMES[frame] + ')';
    frame++;
    setTimeout(nextFrame, DEATH_FRAME_MS);
  }
  nextFrame();
}

function checkDeath() {
  // ── Resurge de Booly (1 sola vez, con la vida actual del rival) ──
  if (G.player.hp <= 0 && G.player.name === 'Booly' && G.player.extra.lives === 1) {
    G.player.extra.lives = 0;
    G.player.hp = Math.max(1, G.enemy.hp);
    triggerHealAnim(G.player);
    document.getElementById('bar-hp1').classList.replace('bar-hp', 'bar-hp-booly');
    addLog(`👻 ¡BOOLY RESURGE con ${G.player.hp}PV (vida del rival)!`, 'log-special');
    renderUI(); return false;
  }
  if (G.enemy.hp <= 0 && G.enemy.name === 'Booly' && G.enemy.extra.lives === 1) {
    G.enemy.extra.lives = 0;
    G.enemy.hp = Math.max(1, G.player.hp);
    triggerHealAnim(G.enemy);
    document.getElementById('bar-hp2').classList.replace('bar-hp', 'bar-hp-booly');
    addLog(`👻 ¡BOOLY RESURGE con ${G.enemy.hp}PV (vida del rival)!`, 'log-special');
    renderUI(); return false;
  }

  const pDead = G.player.hp <= 0, eDead = G.enemy.hp <= 0;
  if (pDead || eDead) {
    renderUI();
    var animsDone = 0;
    var total = (pDead && eDead) ? 2 : 1;
    function onAnimDone() {
      animsDone++;
      if (animsDone >= total) setTimeout(() => showResult(pDead, eDead, false), 1500);
    }
    if (pDead) playDeathAnim('death-left', 'img-left', onAnimDone);
    if (eDead) playDeathAnim('death-right', 'img-right', onAnimDone);
    return true;
  }
  if (G.turnNum > G.turnLimit) { renderUI(); setTimeout(() => showResult(false, false, true), 500); return true; }
  renderUI(); return false;
}

function showResult(pDead, eDead, timeout) {
  // ── MODO REY: interceptar resultado ──
  if (G_REY) {
    var playerWon = eDead && !pDead && !timeout;
    if (playerWon) {
      // Mostrar mensaje de victoria intermedio brevemente, luego siguiente combate
      const t = document.getElementById('result-title');
      const s = document.getElementById('result-sub');
      var enemyName = reyEnemyQueue[reyEnemyIdx];
      t.textContent = '¡VICTORIA!'; t.className = 'result-title result-win';
      s.textContent = `${reyPlayerName} derrota a ${enemyName}`;
      var nextIdx = reyEnemyIdx + 1;
      var total = reyEnemyQueue.length;
      if (nextIdx < total) {
        s.textContent += ` · Siguiente: ${reyEnemyQueue[nextIdx]} (${nextIdx+1}/${total})`;
      }
      show('screen-result');
      playVictorySound();
      reyOnBattleEnd(true);
      return;
    } else {
      // Perdió en modo Rey — fin
      reyOnBattleEnd(false);
      // Caer a mostrar derrota normal abajo
    }
  }

  const t = document.getElementById('result-title');
  const s = document.getElementById('result-sub');
  const WIN_QUOTES = {
    'Moyors':             'Blip blip BLEEEEEP!',
    'Raka':               'RUUUAAARGH jasjasjas...',
    'Giga Morror':        'Objetivo eliminado... Misión de exterminio concluida.',
    'Carno Plant':        'Yo lamento tu terrible destino, Pero.. eso no me quita el hambre de CARNE que tengo MUAJAJAJA.',
    'Pico Escudo':        '...',
    'Embarcación Mortal': 'MIREN MUCHACHOS! MÍRENLO HUNDIRSE COMO PIEDRA EN EL AGUA JAJAJA!',
    'Kabum':              'BOOM BOOM BOOM KABUUUM!',
    'Booly':              'uhh uuhhh uhh... Descansa en paz uhh.',
  };
  if (timeout) {
    t.textContent = 'EMPATE'; t.className = 'result-title';
    s.textContent = '¡30 turnos sin victoria! El tiempo agotó la batalla.';
  } else if (pDead && eDead) {
    t.textContent = 'EMPATE'; t.className = 'result-title';
    s.textContent = 'Ambos caen. Ningún ganador.';
  } else if (eDead) {
    t.textContent = '¡VICTORIA!'; t.className = 'result-title result-win';
    const q = WIN_QUOTES[G.player.name] || '...';
    s.textContent = `${G.player.name}: "${q}"`;
    playVictorySound();
  } else {
    t.textContent = 'DERROTA'; t.className = 'result-title result-lose';
    const q = WIN_QUOTES[G.enemy.name] || '...';
    s.textContent = `${G.enemy.name}: "${q}"`;
    if (!G_PVP) playDefeatSound();
  }
  show('screen-result');
}

  'Moyors':             'FURIA CRECIENTE: cada vez que recibe 5PV de daño, gana +4 ATK permanente que se suma a todas sus habilidades. Cuanto más golpeado esté, más peligroso se vuelve. Su estilo mezcla daño con curación propia en cada ataque.',
  'Raka':               'CRIT (20% chance): daño ×4. Al 50% de PV, crítico sube al 50%. H3 cura 65% de vida perdida.',
  'Giga Morror':        'Cada 2 turnos propios gana +5% Resistencia (reducción de daño). Al 35% obtiene daño ×1.5.',
  'Carno Plant':        'Inicio de turno: +3PV. El veneno tick cada 2 turnos del rival. Tras usar H4 dos veces, H4 cuesta 7PC y H3 multiplica veneno ×3.5.',
  'Pico Escudo':        'RD = Reducción de Daño permanente. Si no recibe golpe en su turno y tiene RD×2 activo, +10PV. H4 activa RD×2 por 4 turnos.',
  'Embarcación Mortal': 'Cañones = daño acumulado. H4 usa todos los Cañones como daño extra. Tras H4, inmune 4 turnos.',
  'Kabum':              '2 vidas: al morir resurge con 10PV, 5 turnos de inmunidad y luego explota causando 60 DMG inevitable al rival.',
  'Booly':              'SV = Vida Robada acumulada en el rival. HP inicial = HP del rival. DESCARGA libera todo el SV acumulado como daño extra. Pasivo: resurge 1 vez con los PV actuales del rival.',
};

function showCardInfo() {
  const name = CARD_NAMES[carouselIdx];
  const card = CARDS[name];
  const img = CARD_IMAGES[name] || '';
  const passive = CARD_PASSIVES[name] || '';

  const skillsHTML = card.skills.map((sk, i) => `
    <div class="card-info-skill">
      <div class="card-info-skill-header">
        <span class="card-info-skill-name">H${i+1}: ${sk.name.toUpperCase()}</span>
        <span class="card-info-skill-cost">${sk.cost}PC</span>
      </div>
      <div class="card-info-skill-desc">${sk.desc}</div>
      ${sk.note ? `<div class="card-info-skill-detail">→ ${getSkillNote(name, sk)}</div>` : ''}
    </div>`).join('');

  document.getElementById('card-info-box').innerHTML = `
    <div class="card-info-header">
      <div class="card-info-img"><img src="${img}" alt="${name}"></div>
      <div>
        <div class="card-info-title">${name.toUpperCase()}</div>
        <div class="card-info-badges">
          <span class="card-info-badge hp">❤ PV: ${card.maxHp}</span>
          <span class="card-info-badge ini">⚡ INIT: ${card.initChance}%</span>
        </div>
      </div>
    </div>
    <div class="card-info-section-title">▸ HABILIDADES</div>
    ${skillsHTML}
    <div class="card-info-section-title">▸ PASIVOS / MECÁNICAS</div>
    <div class="card-info-passive">
      <div class="card-info-passive-desc">${passive}</div>
    </div>
    <div class="overlay-btn-row" style="margin-top:14px">
      <button class="ov-btn ov-btn-close" onclick="hideCardInfo()">CERRAR</button>
    </div>`;

  document.getElementById('card-info-modal').classList.add('show');
}

function getSkillNote(cardName, sk) {
  switch(sk.note) {
    case 'moyors': return `DMG incluye +${G && G.player && G.player.name === 'Moyors' ? G.player.extra.atkBonus : 0} ATK acumulado`;
    case 'dmgH1': return 'Si este turno hay CRIT, daño ×4';
    case 'dmgH2': return 'Si este turno hay CRIT, daño ×4';
    case 'dmgH3': return 'Si hay CRIT: daño ×4. Además cura el 65% de PV perdidos';
    case 'mvp':   return 'Daño extra = mitad de PV perdidos del oponente';
    case 'tvp':   return 'Daño extra = totalidad de PV perdidos del oponente';
    case 'h4':    return 'Tras usarla 1 vez, cuesta 7PC. Tras usarla 2 veces, H3 multiplica veneno ×3.5';
    default: return '';
  }
}

function hideCardInfo() {
  document.getElementById('card-info-modal').classList.remove('show');
}

function addLog(msg, cls) {
  G.log.push({ msg, cls });
}


// ═══════════════════════════════════════════════════════
//  MODO REY
// ═══════════════════════════════════════════════════════
var G_REY = false;
var reyPlayerName = null;
var reyEnemyQueue = [];
var reyEnemyIdx = 0;
var reyResults = []; // {enemyName, won}

function startReyMode() {
  G_REY = true;
  G_PVP = false;
  hide('screen-title');
  hide('screen-result');
  // Mostrar selección de carta para el jugador
  carouselIdx = 0;
  document.getElementById('select-title-text').textContent = '👑 REY: ELIGE TU CARTA';
  renderCarousel();
  show('screen-select');
  // Al confirmar se llamará confirmSelect() → startBattle() pero lo interceptamos
  // Sobreescribimos confirmSelect para el modo Rey
}

function reyStartFirstBattle(playerName) {
  reyPlayerName = playerName;
  // Todos los enemigos en orden aleatorio excepto el jugador
  var allEnemies = Object.keys(CARDS).filter(n => n !== playerName);
  // Mezclar aleatoriamente
  for (var i = allEnemies.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = allEnemies[i]; allEnemies[i] = allEnemies[j]; allEnemies[j] = tmp;
  }
  reyEnemyQueue = allEnemies;
  reyEnemyIdx = 0;
  reyResults = [];
  reyStartNextBattle();
}

function reyStartNextBattle() {
  var enemyName = reyEnemyQueue[reyEnemyIdx];
  var total = reyEnemyQueue.length;

  G.player = initCard(reyPlayerName);
  G.enemy  = initCard(enemyName);
  G.turnNum = 1;
  G.log = [];
  G.diceRolled = false;
  G.turnLimit = 30;

  // Booly HP = rival
  if (reyPlayerName === 'Booly') { G.player.hp = G.enemy.maxHp; G.player.maxHp = G.enemy.maxHp; }
  if (enemyName === 'Booly')     { G.enemy.hp  = G.player.maxHp; G.enemy.maxHp  = G.player.maxHp; }

  G.turn = Math.random() * 100 < G.player.initChance ? 'player' : 'enemy';

  var barHp1 = document.getElementById('bar-hp1');
  var barHp2 = document.getElementById('bar-hp2');
  barHp1.classList.replace('bar-hp-booly', 'bar-hp');
  barHp2.classList.replace('bar-hp-booly', 'bar-hp');

  _sideQueues = { left: [], right: [] };
  _sideRunning = { left: false, right: false };
  var imgL = document.getElementById('img-left');
  var imgR = document.getElementById('img-right');
  var dL   = document.getElementById('death-left');
  var dR   = document.getElementById('death-right');
  imgL.style.visibility = ''; imgR.style.visibility = '';
  dL.classList.remove('playing'); dL.style.backgroundImage = '';
  dR.classList.remove('playing'); dR.style.backgroundImage = '';
  imgL.src = CARD_IMAGES[reyPlayerName] || '';
  imgR.src = CARD_IMAGES[enemyName]  || '';
  document.getElementById('intro-left').classList.remove('playing');
  document.getElementById('intro-left').style.backgroundImage = '';
  document.getElementById('intro-right').classList.remove('playing');
  document.getElementById('intro-right').style.backgroundImage = '';

  // Mode label con progreso
  document.getElementById('mode-box').innerHTML = `<span style="font-size:4px;color:var(--gold);">👑 REY</span><span style="font-size:4px;">${reyEnemyIdx+1}/${total}</span>`;

  showBattle();
  hide('screen-title'); hide('screen-select'); hide('screen-result');
  addLog(`👑 REY — Combate ${reyEnemyIdx+1}/${total}: ${reyPlayerName} VS ${enemyName}`, 'log-system');
  addLog(`▶ ${G.turn === 'player' ? reyPlayerName : enemyName} ATACA PRIMERO`, 'log-system');
  renderUI();

  G.introDone = false;
  var introDone = 0;
  function onIntroDone() {
    introDone++;
    if (introDone >= 2) {
      G.introDone = true;
      if (G.turn === 'enemy') setTimeout(enemyTurn, 600);
    }
  }
  playIntroAnim('intro-left',  'img-left',  reyPlayerName, onIntroDone);
  setTimeout(function() {
    playIntroAnim('intro-right', 'img-right', enemyName, onIntroDone);
  }, 120);
}

function reyOnBattleEnd(playerWon) {
  var enemyName = reyEnemyQueue[reyEnemyIdx];
  reyResults.push({ enemyName: enemyName, won: playerWon });

  if (!playerWon) {
    // Perdió: mostrar derrota normal y terminar modo rey
    G_REY = false;
    return; // showResult ya fue llamado, el jugador verá DERROTA
  }

  // Ganó este combate
  reyEnemyIdx++;
  if (reyEnemyIdx >= reyEnemyQueue.length) {
    // ¡Venció a todos! Pantalla de victoria Rey
    setTimeout(showReyVictory, 800);
  } else {
    // Siguiente combate: breve pausa y continuar
    setTimeout(reyStartNextBattle, 2000);
  }
}

function showReyVictory() {
  // Construir log de resultados
  var logHTML = reyResults.map(function(r, i) {
    return `<div style="color:${r.won ? 'var(--green)' : 'var(--red)'};">${i+1}. ${r.enemyName}: ${r.won ? '✓ VICTORIA' : '✗ DERROTA'}</div>`;
  }).join('');
  document.getElementById('rey-victory-log').innerHTML = logHTML;
  document.getElementById('rey-victory-sub').textContent = `¡${reyPlayerName} ha derrotado a todos!`;
  hide('screen-result');
  show('screen-rey-victory');
  playVictorySound();
}

function hideReyVictory() {
  hide('screen-rey-victory');
  G_REY = false;
}

  // Música eliminada
}
