<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PANDEMÓNIUM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { background: #000; height: 100%; }

:root {
  --bg-void:    #08080d;
  --bg-panel:   #0e0e18;
  --bg-card:    #12121f;
  --bg-mid:     #1a1a2e;
  --border-dim: #2a2a44;
  --border-hot: #ff3a3a;
  --gold:       #ffd60a;
  --red:        #e63946;
  --red-dark:   #7b0000;
  --cyan:       #4cc9f0;
  --cyan-dim:   #1a4a5a;
  --purple:     #7b2fff;
  --green:      #2dc653;
  --white:      #e8e8f0;
  --dim:        #44445a;
  --border-px:  2px solid var(--border-dim);
  --border-hot-px: 2px solid var(--border-hot);
  --glow-red:   0 0 8px rgba(230,57,70,0.6);
  --glow-gold:  0 0 8px rgba(255,214,10,0.5);
  --glow-cyan:  0 0 6px rgba(76,201,240,0.4);
}

/* ══════════════════════════════════════
   REY MODE OVERLAY
══════════════════════════════════════ */
#screen-rey-victory {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9000;
  background: radial-gradient(ellipse at center, #1a0a00 0%, #000 100%);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}
#screen-rey-victory.show { display: flex; }

.rey-crown {
  font-size: 60px;
  animation: crown-bounce 1s ease-in-out infinite alternate;
  margin-bottom: 10px;
}
@keyframes crown-bounce {
  0%   { transform: translateY(0) scale(1); text-shadow: 0 0 20px rgba(255,214,10,0.8); }
  100% { transform: translateY(-10px) scale(1.1); text-shadow: 0 0 40px rgba(255,214,10,1), 0 0 80px rgba(255,120,0,0.6); }
}

.rey-victory-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(12px, 4vw, 22px);
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,214,10,0.9), 2px 2px 0 #7b4500;
  letter-spacing: 2px;
  margin-bottom: 12px;
  line-height: 1.6;
}
.rey-victory-sub {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 2vw, 10px);
  color: var(--white);
  margin-bottom: 20px;
  line-height: 1.8;
  letter-spacing: 1px;
}
.rey-progress-box {
  background: var(--bg-panel);
  border: 2px solid var(--gold);
  padding: 10px 16px;
  margin-bottom: 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  color: var(--cyan);
  letter-spacing: 1px;
  line-height: 2;
  max-width: 340px;
  width: 100%;
  text-align: left;
  box-shadow: 0 0 14px rgba(255,214,10,0.3);
}

/* ── NOISE TEXTURE overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 150px 150px;
}

body {
  background: var(--bg-void);
  font-family: 'Press Start 2P', monospace;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  /* Proporción 9:16 */
  width: min(100vw, 56.25vh);
  height: min(100vh, 177.78vw);
  max-width: 480px;
  max-height: 853px;
  margin: auto;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* ══════════════════════════════════════
   TOP BAR
══════════════════════════════════════ */
.top-bar {
  display: grid;
  grid-template-columns: 68px 1fr 1fr 68px;
  grid-template-rows: 34px 34px;
  background: var(--bg-panel);
  gap: 2px;
  padding: 2px;
  flex-shrink: 0;
  border-bottom: 2px solid var(--border-dim);
}

.face-box {
  grid-row: 1 / 3;
  display: flex;
  align-items: center;
  justify-content: center;
  border: var(--border-px);
  font-size: 26px;
  background: var(--bg-card);
  position: relative;
  overflow: hidden;
}
.face-box::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  pointer-events: none;
}
.face-box-1 { border-color: #2255aa; box-shadow: inset 0 0 12px rgba(34,85,170,0.3); }
.face-box-2 { border-color: #aa3300; box-shadow: inset 0 0 12px rgba(170,51,0,0.3); }

.top-btn {
  background: var(--bg-card);
  border: var(--border-px);
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  letter-spacing: 0.5px;
  line-height: 1.4;
  padding: 2px 3px;
  color: var(--dim);
  transition: color 0.12s, border-color 0.12s;
}
.top-btn:active, .top-btn:hover { color: var(--gold); border-color: var(--gold); }

.turn-box {
  background: var(--bg-mid);
  border: var(--border-px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 7px;
  color: var(--gold);
  text-align: center;
  line-height: 1.5;
  text-shadow: var(--glow-gold);
  letter-spacing: 1px;
}

.mode-box {
  background: var(--bg-card);
  border: var(--border-px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 5px;
  color: var(--dim);
  text-align: center;
  letter-spacing: 1px;
}

/* ══════════════════════════════════════
   ARENA
══════════════════════════════════════ */
.arena {
  background: #0a120a;
  flex-shrink: 0;
  padding: 5px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  border-bottom: 2px solid var(--border-dim);
  position: relative;
}
/* scanline effect sobre arena */
.arena::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.18) 3px,
    rgba(0,0,0,0.18) 4px
  );
  z-index: 1;
}

.card-art-box {
  background: var(--bg-card);
  border: 2px solid var(--border-dim);
  aspect-ratio: 3/4;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card-art-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
  display: block;
  position: relative;
  z-index: 0;
}

/* ── Número de daño flotante ── */
.dmg-popup {
  position: absolute;
  left: 50%;
  top: 40%;
  transform: translate(-50%, -50%);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(14px, 4vw, 22px);
  color: #ff2222;
  text-shadow:
    0 0 8px rgba(255,0,0,0.9),
    0 0 16px rgba(255,80,0,0.7),
    2px 2px 0 #000,
    -1px -1px 0 #000;
  pointer-events: none;
  z-index: 50;
  white-space: nowrap;
  animation: dmg-float 1.2s ease-out forwards;
}
.dmg-popup.dmg-big {
  font-size: clamp(18px, 5.5vw, 30px);
  color: #ffcc00;
  text-shadow:
    0 0 10px rgba(255,200,0,1),
    0 0 20px rgba(255,120,0,0.8),
    2px 2px 0 #000,
    -1px -1px 0 #000;
}
@keyframes dmg-float {
  0%   { opacity: 1;   transform: translate(-50%, -50%) scale(1.4); }
  15%  { opacity: 1;   transform: translate(-50%, -65%) scale(1.0); }
  70%  { opacity: 0.9; transform: translate(-50%, -120%) scale(0.95); }
  100% { opacity: 0;   transform: translate(-50%, -160%) scale(0.8); }
}

/* ══════════════════════════════════════
   BARRAS
══════════════════════════════════════ */
.bars-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 13px 13px;
  gap: 2px;
  padding: 2px 2px;
  flex-shrink: 0;
  background: var(--bg-panel);
}

.bar-slot {
  border: var(--border-px);
  position: relative;
  overflow: hidden;
  background: #0a0a14;
}
.bar-slot-hp1, .bar-slot-hp2 { border-color: #4a1515; }
.bar-slot-pc1, .bar-slot-pc2 { border-color: #0a2a3a; }

.bar-inner {
  height: 100%;
  transition: width 0.4s cubic-bezier(0.25,0.8,0.25,1);
  position: relative;
}
.bar-hp      { background: linear-gradient(90deg, #8b0000, #e63946); }
.bar-hp-booly { background: linear-gradient(90deg, #4a0080, #9b30ff); }
.bar-pc-fill { background: linear-gradient(90deg, #003355, #4cc9f0); }

.bar-inner::after {
  content: attr(data-label);
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 6px;
  color: rgba(232,232,240,0.95);
  font-family: 'Press Start 2P', monospace;
  white-space: nowrap;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
}

/* ══════════════════════════════════════
   STATUS TAGS
══════════════════════════════════════ */
.status-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  padding: 2px 2px;
  flex-shrink: 0;
  background: var(--bg-panel);
}

.status-box {
  background: var(--bg-card);
  border: var(--border-px);
  min-height: 22px;
  padding: 2px 3px;
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  align-items: center;
}

.status-tag {
  font-size: 5px;
  padding: 1px 3px;
  border: 1px solid rgba(123,47,255,0.5);
  color: #c4a0ff;
  white-space: nowrap;
  background: rgba(123,47,255,0.15);
  letter-spacing: 0.3px;
}

/* ══════════════════════════════════════
   HABILIDADES
══════════════════════════════════════ */
.skills-section {
  padding: 2px;
  background: var(--bg-panel);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.skill-row {
  display: grid;
  grid-template-columns: 42px 1fr;
  gap: 0;
  border: var(--border-px);
  overflow: hidden;
  min-height: 52px;
  transition: border-color 0.1s;
}
.skill-row:has(.skill-body-col:not(.disabled)):hover {
  border-color: var(--gold);
}

.skill-cost-col {
  background: var(--bg-void);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-right: 2px solid var(--border-dim);
  padding: 2px;
  gap: 1px;
}
.skill-cost-col .pc-label {
  font-size: 5px;
  color: var(--cyan);
  letter-spacing: 0.5px;
  text-shadow: var(--glow-cyan);
}
.skill-cost-col .pc-value {
  font-size: 12px;
  color: var(--gold);
  line-height: 1;
  text-shadow: var(--glow-gold);
}
.skill-cost-col.cant-afford {
  background: #0d0d0d;
}
.skill-cost-col.cant-afford .pc-value { color: #333; text-shadow: none; }
.skill-cost-col.cant-afford .pc-label { color: #333; text-shadow: none; }

.skill-body-col {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 3px 7px;
  background: var(--bg-card);
  cursor: pointer;
  transition: background 0.1s;
  gap: 2px;
}
.skill-body-col:not(.disabled):active,
.skill-body-col:not(.disabled):hover { background: var(--bg-mid); }
.skill-body-col.disabled {
  background: #0b0b14;
  cursor: not-allowed;
}

.skill-name {
  font-size: 7px;
  color: var(--white);
  letter-spacing: 0.3px;
  line-height: 1.3;
}
.skill-body-col.disabled .skill-name { color: var(--dim); }

.skill-effect-line {
  font-size: 6px;
  color: var(--red);
  line-height: 1.3;
  text-shadow: 0 0 4px rgba(230,57,70,0.4);
}
.skill-body-col.disabled .skill-effect-line { color: #332222; text-shadow: none; }

.skill-note-line {
  font-size: 5px;
  color: var(--cyan);
  line-height: 1.2;
  opacity: 0.8;
}
.skill-body-col.disabled .skill-note-line { color: #222; opacity: 1; }

.skills-pc-footer {
  font-size: 7px;
  color: var(--gold);
  text-align: center;
  padding: 3px;
  flex-shrink: 0;
  background: var(--bg-void);
  border: var(--border-px);
  letter-spacing: 1px;
  text-shadow: var(--glow-gold);
}

/* ══════════════════════════════════════
   BOTONES DADO / GUARDAR
══════════════════════════════════════ */
.action-row {
  display: flex;
  flex-shrink: 0;
}

.dice-btn {
  background: var(--bg-card);
  border: var(--border-px);
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  cursor: pointer;
  padding: 9px 4px;
  text-align: center;
  letter-spacing: 0.5px;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.dice-btn {
  color: var(--gold);
  border-color: #5a4800;
  text-shadow: var(--glow-gold);
}
.dice-btn:not(:disabled):hover  { background: #1a1400; border-color: var(--gold); }
.save-btn { display: none !important; }
.dice-btn:disabled { opacity: 0.25; cursor: not-allowed; }

/* ══════════════════════════════════════
   OVERLAYS
══════════════════════════════════════ */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.overlay.show { display: flex; }

.overlay-box {
  background: var(--bg-panel);
  border: 2px solid var(--border-dim);
  padding: 20px;
  max-width: 320px;
  width: 90%;
  font-family: 'Press Start 2P', monospace;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.overlay-title {
  font-size: 9px;
  margin-bottom: 14px;
  color: var(--gold);
  text-align: center;
  letter-spacing: 2px;
  text-shadow: var(--glow-gold);
}

.overlay-log {
  max-height: 50vh;
  overflow-y: auto;
  font-size: 7px;
  color: var(--white);
  line-height: 2.2;
  margin-bottom: 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--dim) transparent;
}

.overlay-btn-row {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.ov-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 8px 14px;
  border: 2px solid var(--border-dim);
  cursor: pointer;
  background: var(--bg-card);
  color: var(--dim);
  transition: border-color 0.1s, color 0.1s;
}
.ov-btn-yes { border-color: #4a1515; color: var(--red); }
.ov-btn-yes:hover { background: #1a0808; border-color: var(--red); }
.ov-btn-no  { border-color: #1a4025; color: var(--green); }
.ov-btn-no:hover { background: #0a1a10; border-color: var(--green); }
.ov-btn-close { border-color: #333; color: var(--white); }
.ov-btn-close:hover { border-color: var(--white); }

/* log colors */
.log-player  { color: #6ab0ff; }
.log-enemy   { color: #ff6b6b; }
.log-system  { color: var(--gold); font-weight: bold; }
.log-special { color: #c77dff; text-shadow: 0 0 6px rgba(199,125,255,0.4); }
.log-status  { color: var(--dim); }
.log-heal    { color: var(--green); }
.log-damage  { color: var(--red); }

/* ══════════════════════════════════════
   CARD INFO MODAL
══════════════════════════════════════ */
.card-info-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0.92);
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  backdrop-filter: blur(3px);
}
.card-info-modal.show { display: flex; }

.card-info-box {
  background: var(--bg-panel);
  border: 2px solid var(--border-dim);
  padding: 16px;
  max-width: 340px;
  width: 94%;
  margin: 20px auto;
  font-family: 'Press Start 2P', monospace;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.card-info-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.card-info-img {
  width: 64px;
  min-width: 64px;
  aspect-ratio: 3/4;
  border: 2px solid var(--border-dim);
  overflow: hidden;
  background: var(--bg-card);
}
.card-info-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
  display: block;
}

.card-info-title {
  font-size: 8px;
  color: var(--gold);
  letter-spacing: 1px;
  text-shadow: var(--glow-gold);
  margin-bottom: 6px;
}

.card-info-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.card-info-badge {
  font-size: 5.5px;
  padding: 2px 5px;
  border: 1px solid var(--border-dim);
  color: var(--white);
  background: var(--bg-card);
  white-space: nowrap;
}
.card-info-badge.hp  { border-color: var(--red);   color: var(--red); }
.card-info-badge.ini { border-color: var(--green);  color: var(--green); }

.card-info-section-title {
  font-size: 6px;
  color: var(--dim);
  letter-spacing: 2px;
  margin: 12px 0 6px;
  border-bottom: 1px solid var(--border-dim);
  padding-bottom: 4px;
}

.card-info-skill {
  border-left: 2px solid var(--purple);
  background: var(--bg-card);
  padding: 6px 8px;
  margin-bottom: 5px;
}

.card-info-skill-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 3px;
}

.card-info-skill-name {
  font-size: 6.5px;
  color: var(--white);
}

.card-info-skill-cost {
  font-size: 6.5px;
  color: var(--gold);
  text-shadow: var(--glow-gold);
  white-space: nowrap;
}

.card-info-skill-desc {
  font-size: 5px;
  color: var(--cyan);
  line-height: 1.5;
  margin-bottom: 2px;
}

.card-info-skill-detail {
  font-size: 5px;
  color: var(--dim);
  line-height: 1.5;
}

.card-info-passive {
  background: var(--bg-card);
  border-left: 2px solid var(--gold);
  padding: 6px 8px;
  margin-bottom: 5px;
}

.card-info-passive-title {
  font-size: 5.5px;
  color: var(--gold);
  margin-bottom: 3px;
}

.card-info-passive-desc {
  font-size: 5px;
  color: var(--dim);
  line-height: 1.5;
}
#screen-title, #screen-select, #screen-result {
  display: none;
  position: fixed;
  inset: 0;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  background: var(--bg-void);
  z-index: 200;
  overflow: hidden;
}
#screen-title { justify-content: center; overflow-y: auto; }
#screen-result { justify-content: center; overflow-y: auto; }
#screen-title.show, #screen-select.show, #screen-result.show { display: flex; }

/* fondo de título: degradado radial dramático */
#screen-title {
  display: none;
  position: fixed;
  inset: 0;

  width: 100%;
  height: 100%;

  flex-direction: column;
  align-items: center;
  justify-content: center;

.title-logo {
  font-size: clamp(14px, 5.5vw, 40px); /* Tamaño más pequeño y adaptable */
  color: var(--red);
  text-shadow:
    2px 2px 0 var(--red-dark),
    4px 4px 0 rgba(123,0,0,0.4);
  letter-spacing: 1px; /* Casi sin espacio entre letras para ganar ancho */
  margin: 10px auto; /* Centrado automático */
  animation: title-pulse 2.4s ease-in-out infinite;
  text-align: center;
  width: 95%; /* Ocupa casi todo el ancho pero con margen */
  white-space: normal; /* Permite que el texto baje si es necesario */
  line-height: 1.4;    /* Espacio entre líneas por si salta a dos */
  word-wrap: break-word; 
}


@keyframes title-pulse {
  0%,100% {
    text-shadow: 3px 3px 0 var(--red-dark), 0 0 24px rgba(230,57,70,0.4);
    letter-spacing: 10px;
  }
  50% {
    text-shadow: 3px 3px 0 var(--red-dark), 0 0 52px rgba(230,57,70,0.9), 0 0 80px rgba(230,57,70,0.3);
    letter-spacing: 12px;
  }
}

.title-sub {
  font-size: 7px;
  color: var(--dim);
  letter-spacing: 5px;
  margin-bottom: 52px;
}

/* línea decorativa bajo subtítulo */
.title-sub::after {
  content: '';
  display: block;
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--dim), transparent);
  margin: 10px auto 0;
}

.px-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  padding: 12px 24px;
  border: 2px solid currentColor;
  background: transparent;
  cursor: pointer;
  letter-spacing: 1px;
  margin: 5px;
  transition: background 0.12s, text-shadow 0.12s, box-shadow 0.12s;
}
.px-btn-start {
  color: var(--gold);
  font-size: 12px;
  border-color: var(--gold);
  text-shadow: var(--glow-gold);
}
.px-btn-start:hover {
  background: rgba(255,214,10,0.08);
  box-shadow: 0 0 14px rgba(255,214,10,0.3);
}
.px-btn-red   { color: var(--red); }
.px-btn-red:hover { background: rgba(230,57,70,0.08); }
.px-btn-dim   { color: var(--dim); font-size: 7px; }
.px-btn-dim:hover { color: var(--white); }

/* ══════════════════════════════════════
   PANTALLA SELECCIÓN — CARRUSEL
══════════════════════════════════════ */
.select-wrap {
  width: 100%;
  max-width: 480px;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
}

.select-title {
  font-size: 8px;
  color: var(--cyan);
  letter-spacing: 3px;
  text-shadow: var(--glow-cyan);
  flex-shrink: 0;
  width: 100%;
  text-align: center;
  padding: 12px 8px 10px;
  background: var(--bg-panel);
  border-bottom: 2px solid var(--border-dim);
}

/* ── ÁREA IMAGEN ── */
.carousel-img-area {
  flex-shrink: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  background: #0a0a10;
  padding: 10px 0 8px;
  position: relative;
}

.carousel-arrow {
  background: transparent;
  border: none;
  font-family: 'Press Start 2P', monospace;
  font-size: 18px;
  color: var(--dim);
  cursor: pointer;
  padding: 0 12px;
  flex-shrink: 0;
  transition: color 0.1s;
  user-select: none;
  -webkit-user-select: none;
}
.carousel-arrow:active,
.carousel-arrow:hover { color: var(--gold); }

.carousel-img-frame {
  width: 42%;
  aspect-ratio: 3/4;
  border: 2px solid var(--border-dim);
  overflow: hidden;
  position: relative;
  background: var(--bg-card);
  flex-shrink: 0;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.carousel-img-frame.selected {
  border-color: var(--gold);
  box-shadow: 0 0 16px rgba(255,214,10,0.3);
}
.carousel-img-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
  display: block;
}

.carousel-counter {
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 5px;
  color: var(--dim);
  letter-spacing: 1px;
  white-space: nowrap;
}

/* ── PANEL INFO ── */
.carousel-info {
  flex: 1;
  width: 100%;
  overflow-y: auto;
  background: var(--bg-panel);
  padding: 10px 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--dim) transparent;
}

.carousel-card-name {
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-shadow: var(--glow-gold);
  text-align: center;
}

.carousel-stats-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.carousel-stat-badge {
  font-size: 6px;
  padding: 2px 6px;
  border: 1px solid var(--border-dim);
  color: var(--white);
  background: var(--bg-card);
  white-space: nowrap;
}
.carousel-stat-badge.hp  { border-color: var(--red);    color: var(--red); }
.carousel-stat-badge.ini { border-color: var(--green);  color: var(--green); }

.carousel-skills-title {
  font-size: 6px;
  color: var(--dim);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.carousel-skill-entry {
  border-left: 2px solid var(--purple);
  background: var(--bg-card);
  padding: 5px 8px;
  margin-bottom: 4px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 2px 6px;
}
.carousel-skill-entry .sk-name {
  font-size: 7px;
  color: var(--white);
  grid-column: 1;
}
.carousel-skill-entry .sk-cost {
  font-size: 7px;
  color: var(--gold);
  text-shadow: var(--glow-gold);
  grid-column: 2;
  white-space: nowrap;
}
.carousel-skill-entry .sk-desc {
  font-size: 5.5px;
  color: var(--cyan);
  grid-column: 1 / -1;
  line-height: 1.4;
}

/* ── FOOTER ── */
.select-footer {
  flex-shrink: 0;
  width: 100%;
  display: flex;
  gap: 8px;
  justify-content: center;
  padding: 10px 14px;
  background: var(--bg-void);
  border-top: 2px solid var(--border-dim);
}

/* ══════════════════════════════════════
   PANTALLA RESULTADO
══════════════════════════════════════ */
.result-box {
  text-align: center;
  padding: 28px 22px;
  border: 2px solid var(--border-dim);
  background: var(--bg-panel);
  max-width: 360px;
  width: 90%;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
}
.result-title {
  font-size: clamp(16px, 5.5vw, 32px);
  margin-bottom: 14px;
  letter-spacing: 4px;
}
.result-sub {
  font-size: 8px;
  color: var(--dim);
  margin-bottom: 24px;
  line-height: 2.2;
}
.result-win  { color: var(--gold); text-shadow: var(--glow-gold); }
.result-lose { color: var(--red);  text-shadow: var(--glow-red); }

/* ══════════════════════════════════════
   PANTALLA BATALLA
══════════════════════════════════════ */
#screen-battle {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  overflow: hidden;
  background: var(--bg-void);
}

#battle-scroll-body {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  scrollbar-width: thin;
  scrollbar-color: var(--dim) transparent;
}

/* turn indicator: borde dorado brillante */
.active-card-left  { border-color: var(--gold) !important; box-shadow: inset 0 0 0 2px var(--gold), 0 0 12px rgba(255,214,10,0.3) !important; }
.active-card-right { border-color: var(--gold) !important; box-shadow: inset 0 0 0 2px var(--gold), 0 0 12px rgba(255,214,10,0.3) !important; }

/* ══════════════════════════════════════
   DEATH ANIMATION OVERLAY
══════════════════════════════════════ */
.death-anim-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: none;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  image-rendering: pixelated;
}
.death-anim-overlay.playing {
  display: block;
}

/* ── PRE-BATTLE INTRO OVERLAY ── */
.intro-anim-overlay {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 10;
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  image-rendering: pixelated;
}
.intro-anim-overlay.playing {
  display: block;
}

/* ── HIT IMPACT OVERLAY ── */
.hit-anim-overlay {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 12;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  image-rendering: pixelated;
  pointer-events: none;
}
.hit-anim-overlay.playing {
  display: block;
}
/* ── HEAL ANIMATION OVERLAY ── */
.heal-anim-overlay {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 11;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  image-rendering: pixelated;
  pointer-events: none;
}
.heal-anim-overlay.playing {
  display: block;
}
</style>
</head>
<body>

  function obtenerImagenExpresion(hpActual, hpMax) {
    // Calculamos qué porcentaje de vida queda (de 0 a 1)
    const porcentaje = hpActual / hpMax;
    
    // 1. Si la vida es 0 o menos, usamos la expresión de "muerto"
    if (porcentaje <= 0) {
        return 'expresion_muerto.png';
    } 
    // 2. Si tiene 30% o menos, usamos la de "crítico"
    else if (porcentaje <= 0.3) {
        return 'expresion_critico.png';
    } 
    // 3. Si tiene 70% o menos, usamos la de "herido"
    else if (porcentaje <= 0.7) {
        return 'expresion_herido.png';
    } 
    // 4. Si tiene más de 70%, está saludable ("neutral")
    else {
        return 'expresion_neutral.png';
    }
}

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

function initCard(name) {
  const c = deepClone(CARDS[name]);
  c.pc = 0; c.poison = 0;
  return c;
}

function confirmSelectPvP() {
  if (pvpSelectStep === 0) {
    pvpP1Card = CARD_NAMES[carouselIdx];

    carouselIdx = (carouselIdx + 1) % CARD_NAMES.length;

// ═══════════════════════════════════════════════════════
function startBattle(playerName) {
  const enemies = Object.keys(CARDS).filter(n => n !== playerName);
  const enemyName = enemies[Math.floor(Math.random() * enemies.length)];

  G.player = initCard(playerName);
  G.enemy  = initCard(enemyName);
  G.turnNum = 1;
  G.log = [];
  G.diceRolled = false;
  G.turnLimit = 30;

  // Booly HP = rival
  if (playerName === 'Booly') { G.player.hp = G.enemy.maxHp; G.player.maxHp = G.enemy.maxHp; }
  if (enemyName === 'Booly')  { G.enemy.hp  = G.player.maxHp; G.enemy.maxHp  = G.player.maxHp; }

  // Who goes first
  G.turn = Math.random() * 100 < G.player.initChance ? 'player' : 'enemy';

  // Reset HP bar colors (Booly puede haberlas dejado moradas)
  var barHp1 = document.getElementById('bar-hp1');
  var barHp2 = document.getElementById('bar-hp2');
  barHp1.classList.replace('bar-hp-booly', 'bar-hp');
  barHp2.classList.replace('bar-hp-booly', 'bar-hp');

  // Reset animation queues
  _sideQueues = { left: [], right: [] };
  _sideRunning = { left: false, right: false };
  var imgL = document.getElementById('img-left');
  var imgR = document.getElementById('img-right');
  var dL   = document.getElementById('death-left');
  var dR   = document.getElementById('death-right');
  imgL.style.visibility = ''; imgR.style.visibility = '';
  dL.classList.remove('playing'); dL.style.backgroundImage = '';
  dR.classList.remove('playing'); dR.style.backgroundImage = '';

  // Set card images
  imgL.src = CARD_IMAGES[playerName] || '';
  imgR.src = CARD_IMAGES[enemyName]  || '';

  // Reset intro overlays
  document.getElementById('intro-left').classList.remove('playing');
  document.getElementById('intro-left').style.backgroundImage = '';
  document.getElementById('intro-right').classList.remove('playing');
  document.getElementById('intro-right').style.backgroundImage = '';

  showBattle();
  hide('screen-title'); hide('screen-select'); hide('screen-result');

  // Update mode-box
  document.getElementById('mode-box').textContent = 'PANDEMÓNIUM';

  addLog(`⚔ DUELO: ${playerName} VS ${enemyName}`, 'log-system');
  addLog(`▶ ${G.turn === 'player' ? playerName : enemyName} ATACA PRIMERO`, 'log-system');

  renderUI();

  // Bloquear habilidades durante intro
  G.introDone = false;
  var introDone = 0;
  function onIntroDone() {
    introDone++;
    if (introDone >= 2) {
      G.introDone = true;
      if (G.turn === 'enemy') setTimeout(enemyTurn, 600);
    }
  }
  playIntroAnim('intro-left',  'img-left',  playerName, onIntroDone);
  setTimeout(function() {
    playIntroAnim('intro-right', 'img-right', enemyName, onIntroDone);
  }, 120); // ligero desfase para que no sean idénticas
}

function startBattlePvP(p1Name, p2Name) {
  G.player = initCard(p1Name);
  G.enemy  = initCard(p2Name);
  G.turnNum = 1;
  G.log = [];
  G.diceRolled = false;
  G.turnLimit = 30;

  if (p1Name === 'Booly') { G.player.hp = G.enemy.maxHp; G.player.maxHp = G.enemy.maxHp; }
  if (p2Name === 'Booly')  { G.enemy.hp  = G.player.maxHp; G.enemy.maxHp  = G.player.maxHp; }

  G.turn = Math.random() * 100 < G.player.initChance ? 'player' : 'enemy';

  // Reset HP bar colors (Booly puede haberlas dejado moradas)
  var barHp1 = document.getElementById('bar-hp1');
  var barHp2 = document.getElementById('bar-hp2');
  barHp1.classList.replace('bar-hp-booly', 'bar-hp');
  barHp2.classList.replace('bar-hp-booly', 'bar-hp');

  _sideQueues = { left: [], right: [] };
  _sideRunning = { left: false, right: false };
  var imgL = document.getElementById('img-left');
  var imgR = document.getElementById('img-right');
  var dL   = document.getElementById('death-left');
  var dR   = document.getElementById('death-right');
  imgL.style.visibility = ''; imgR.style.visibility = '';
  dL.classList.remove('playing'); dL.style.backgroundImage = '';
  dR.classList.remove('playing'); dR.style.backgroundImage = '';

  imgL.src = CARD_IMAGES[p1Name] || '';
  imgR.src = CARD_IMAGES[p2Name]  || '';

  document.getElementById('intro-left').classList.remove('playing');
  document.getElementById('intro-left').style.backgroundImage = '';
  document.getElementById('intro-right').classList.remove('playing');
  document.getElementById('intro-right').style.backgroundImage = '';

  // Update mode-box label
  document.getElementById('mode-box').textContent = 'PvP';

  showBattle();
  hide('screen-title'); hide('screen-select'); hide('screen-result');

  addLog(`⚔ PvP: J1 (${p1Name}) VS J2 (${p2Name})`, 'log-system');
  var whoFirst = G.turn === 'player' ? `J1 (${p1Name})` : `J2 (${p2Name})`;
  addLog(`▶ ${whoFirst} ATACA PRIMERO`, 'log-system');

  renderUI();

  G.introDone = false;
  var introDone = 0;
  function onIntroDone() {
    introDone++;
    if (introDone >= 2) { G.introDone = true; }
  }
  playIntroAnim('intro-left',  'img-left',  p1Name, onIntroDone);
  setTimeout(function() {
    playIntroAnim('intro-right', 'img-right', p2Name, onIntroDone);
  }, 120);
}


function renderUI() {
  const p = G.player, e = G.enemy;

  // Bars
  setBar('bar-hp1',  p.hp / p.maxHp, `${p.hp}/${p.maxHp}PV`);
  setBar('bar-pc1',  Math.min(1, p.pc / 30), `${p.pc}PC`);
  setBar('bar-hp2',  e.hp / e.maxHp, `${e.hp}/${e.maxHp}PV`);
  setBar('bar-pc2',  Math.min(1, e.pc / 30), `${e.pc}PC`);

  // Faces
  setFace('face-1', p);
  setFace('face-2', e);

  // Turn
  const remaining = G.turnLimit - G.turnNum + 1;
  const turnEl = document.getElementById('turn-box');
  const pvpLabel = G_PVP ? (G.turn === 'player' ? '<br><span style="font-size:5px;color:#4488ff">J1</span>' : '<br><span style="font-size:5px;color:#ff6644">J2</span>') : '';
  if (remaining <= 5 && remaining > 0) {
    turnEl.innerHTML = `TURNO<br>${G.turnNum}${pvpLabel}<br><span style="color:var(--red);font-size:5px">⚠${remaining}T</span>`;
  } else {
    turnEl.innerHTML = `TURNO<br>${G.turnNum}${pvpLabel}`;
  }

  // Active card glow
  document.getElementById('art-left').className  = 'card-art-box' + (G.turn === 'player' ? ' active-card-left' : '');
  document.getElementById('art-right').className = 'card-art-box' + (G.turn === 'enemy'  ? ' active-card-right' : '');

  // Status
  renderStatus('status-left',  p);
  renderStatus('status-right', e);

  // Skills
  renderSkills();
}

function setBar(id, pct, label) {
  const el = document.getElementById(id);
  el.style.width = Math.max(0, Math.min(100, pct * 100)) + '%';
  el.setAttribute('data-label', label);
}

function setFace(id, card) {
  const pct = card.hp / card.maxHp;
  const el = document.getElementById(id);
  let imgKey;
  if (pct <= 0)       imgKey = 'muerto';
  else if (pct <= 0.3) imgKey = 'critico';
  else if (pct <= 0.7) imgKey = 'herido';
  else                 imgKey = 'neutral';

  // Si ya tiene un <img> lo actualizamos, si no lo creamos
  let img = el.querySelector('img.face-expr');
  if (!img) {
    el.textContent = '';
    img = document.createElement('img');
    img.className = 'face-expr';
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;image-rendering:pixelated;';
    el.appendChild(img);
  }
  img.src = FACE_IMAGES[imgKey];
}

function renderStatus(elId, card) {
  const el = document.getElementById(elId);
  let tags = [];
  if (card.poison > 0) tags.push(`☠Ve:${card.poison}`);
  if (card.extra?.rd > 0) tags.push(`🛡RD:${card.extra.rd}${card.extra.rdDouble?'×2':''}`);
  if (card.extra?.stored > 0) tags.push(`💜SV:${card.extra.stored}`);
  if (card.extra?.cannon > 0) tags.push(`💥C:${card.extra.cannon}`);
  if (card.extra?.resistance > 0) tags.push(`⚡${card.extra.resistance}%`);
  if (card.extra?.atkBonus > 0) tags.push(`⚔+${card.extra.atkBonus}`);
  if (card.extra?.immune > 0) tags.push(`✨IMN:${card.extra.immune}T`);
  if (card.name === 'Kabum' && card.extra?.lives === 2) tags.push(`💕V1`);
  if (card.name === 'Kabum' && card.extra?.lives === 1 && !card.extra?.postExplosion) tags.push(`💣${card.extra.immuneTurns}T`);
  if (card.name === 'Kabum' && card.extra?.postExplosion) tags.push(`💥POST`);
  el.innerHTML = tags.map(t => `<span class="status-tag">${t}</span>`).join('');
}

function renderSkills() {
  const el = document.getElementById('skills-section');
  el.innerHTML = '';

  const isP = G.turn === 'player';
  const card = isP ? G.player : G.enemy;

  // En modo PvP ambos turnos son controlados por humanos
  if (!isP && !G_PVP) {
    el.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;flex:1;font-size:7px;color:#555;text-align:center">TURNO DE LA IA...<br><br>esperando...</div>`;
    return;
  }

  // En PvP, mostrar indicador de qué jugador debe actuar
  if (G_PVP && !G.diceRolled) {
    const jLabel = isP ? 'J1' : 'J2';
    const jColor = isP ? '#2255aa' : '#aa3300';
    el.innerHTML = `
      <div style="font-family:'Press Start 2P',monospace;font-size:6px;color:${jColor};text-align:center;padding:4px 0 2px;">
        TURNO DE ${jLabel}
      </div>
      <div style="display:flex;align-items:center;justify-content:center;flex:1;gap:6px;padding:0 6px;">
        <button onclick="rollDice()" style="
          font-family:'Press Start 2P',monospace;
          font-size:10px;
          padding:12px 20px;
          background:var(--bg-void);
          border:2px solid ${jColor};
          color:${jColor};
          cursor:pointer;
          letter-spacing:1px;
          width:100%;
        ">🎲 ${jLabel}: TIRAR DADO</button>
      </div>`;
    return;
  }

  if (!G.diceRolled) {
    el.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;flex:1;gap:6px;padding:0 6px;">
        <button onclick="rollDice()" style="
          font-family:'Press Start 2P',monospace;
          font-size:10px;
          padding:12px 20px;
          background:var(--bg-void);
          border:2px solid var(--gold);
          color:var(--gold);
          text-shadow:0 0 10px rgba(255,214,10,0.7);
          box-shadow:0 0 18px rgba(255,214,10,0.2);
          cursor:pointer;
          letter-spacing:1px;
          width:100%;
        ">🎲 TIRAR DADO</button>
      </div>`;
    return;
  }

  card.skills.forEach((sk, i) => {
    const cost = getSkillCost(card, i);
    const canAfford = card.pc >= cost;

    const row = document.createElement('div');
    row.className = 'skill-row';

    // ── Columna izquierda: costo PC ──
    const costCol = document.createElement('div');
    costCol.className = 'skill-cost-col' + (canAfford ? '' : ' cant-afford');
    costCol.innerHTML = `<span class="pc-label">PC</span><span class="pc-value">${cost}</span>`;

    // ── Columna derecha: nombre + efecto ──
    const bodyCol = document.createElement('div');
    bodyCol.className = 'skill-body-col' + (canAfford ? '' : ' disabled');

    // Línea de nota extra según tipo de habilidad
    let noteLine = '';
    if (sk.note === 'dmgH3' && card.name === 'Raka') noteLine = 'Cura 65% vida perdida';
    else if (sk.note === 'mvp') noteLine = 'Daño = mitad PV perdidos';
    else if (sk.note === 'tvp') noteLine = 'Daño = total PV perdidos';
    else if (sk.note === 'h4' && card.name === 'Carno Plant') {
      if (card.extra.h4Used === 0) noteLine = `1er uso: costo 13→7 | 2do uso: H3 ×3`;
      else if (card.extra.h4Used === 1) noteLine = `2do uso activo: H3 pasará a ×3`;
      else noteLine = 'Ya sin bonificaciones';
    }
    // Carno Plant H3: mostrar multiplicador actual
    if (sk.effect === 'dmg_mult_poison' && card.name === 'Carno Plant') {
      noteLine = `Ve × ${card.extra.h3Mult}`;
    }
    // Para Booly: mostrar SV acumulado en TDS
    if (sk.effect === 'tds') noteLine = `SV acumulado: ${card.extra?.stored ?? 0}`;
    // Para Embarcación: mostrar cañones en cannon_fire
    if (sk.effect === 'cannon_fire') noteLine = `Cañones acumulados: ${card.extra?.cannon ?? 0}`;
    // Para Kabum: mostrar vidas restantes
    if (card.name === 'Kabum') {
      if (i === 2) noteLine = `Vidas: ${card.extra?.lives ?? '?'}`;
    }
    // Crit de Raka activo este turno
    if (card.name === 'Raka' && card.extra?.critThisTurn) noteLine = '¡CRÍTICO ×2.5 ACTIVO!';

    bodyCol.innerHTML = `
      <div class="skill-name">${sk.name.toUpperCase()}</div>
      <div class="skill-effect-line">${sk.desc || ''}</div>
      ${noteLine ? `<div class="skill-note-line">${noteLine}</div>` : ''}
    `;

    if (canAfford) {
      bodyCol.onclick = () => playerUseSkill(i);
    }

    row.appendChild(costCol);
    row.appendChild(bodyCol);
    el.appendChild(row);
  });

  // Footer: PC disponibles + botón guardar turno
  const footer = document.createElement('div');
  footer.className = 'skills-pc-footer';
  footer.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:6px;padding:3px 6px;';
  footer.innerHTML = `
    <span>PC: ${card.pc}</span>
    <button onclick="savePC()" style="
      font-family:'Press Start 2P',monospace;
      font-size:6px;
      padding:4px 8px;
      background:var(--bg-void);
      border:1px solid var(--green);
      color:var(--green);
      cursor:pointer;
      letter-spacing:0.5px;
      white-space:nowrap;
    ">💾 PASAR TURNO</button>
  `;
  el.appendChild(footer);
}

function getSkillCost(card, idx) {
  let cost = card.skills[idx].cost;
  // Carno Plant H4: primer uso cuesta 13, tras el primer uso baja a 7
  if (card.name === 'Carno Plant' && idx === 3 && card.extra.h4Used >= 1) cost = 7;
  return cost;
}

// ═══════════════════════════════════════════════════════
//  DICE
// ═══════════════════════════════════════════════════════
// ─── SONIDO: PIKI (tacto en batalla) ───────────────────
function playPiki() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1400, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1900, ctx.currentTime + 0.03);
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.234, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.07);
    setTimeout(() => ctx.close(), 300);
  } catch(e) {}
}

function rollDice() {
  if (!G.introDone) return;
  // En PvP funciona en ambos turnos; en 1P solo en turno del jugador
  if (!G_PVP && G.turn !== 'player') return;
  if (G.diceRolled) return;
  playPiki();
  const val = Math.floor(Math.random() * 6) + 1;
  G.diceVal = val;
  G.diceRolled = true;

  const isPlayerTurn = G.turn === 'player';
  const card = isPlayerTurn ? G.player : G.enemy;
  const logCls = isPlayerTurn ? 'log-player' : 'log-enemy';
  const jLabel = (G_PVP && !isPlayerTurn) ? 'J2' : '';

  if (card.name === 'Raka') {
    const isCrit = Math.random() * 100 < card.extra.critChance;
    card.extra.critThisTurn = isCrit;
    if (isCrit) {
      const triple = val * 3;
      card.pc += triple;
      addLog(`🎲 ${jLabel} DADO ${val} → ¡RAKA! ×3PC +${triple}PC + crit activo`, 'log-special');
    } else {
      card.extra.critThisTurn = false;
      card.pc += val;
      addLog(`🎲 ${jLabel} DADO ${val} → +${val}PC (Total: ${card.pc}PC)`, logCls);
    }
  } else {
    card.pc += val;
    addLog(`🎲 ${jLabel} DADO ${val} → +${val}PC (Total: ${card.pc}PC)`, logCls);
  }
  renderUI();
}

function savePC() {
  // En PvP funciona en ambos turnos
  if (!G_PVP && G.turn !== 'player') return;
  if (!G.diceRolled) return;
  playPiki();
  const isPlayerTurn = G.turn === 'player';
  const card = isPlayerTurn ? G.player : G.enemy;
  const logCls = isPlayerTurn ? 'log-player' : 'log-enemy';
  addLog(`💾 ${card.name} guarda (PC: ${card.pc})`, logCls);
  if (isPlayerTurn) endPlayerTurn();
  else endEnemyTurnPvP();
}

// ═══════════════════════════════════════════════════════
//  APPLY DAMAGE
// ═══════════════════════════════════════════════════════
// ── Muestra número de daño flotante sobre la carta ──
function showDamageNumber(card, amount) {
  if (!amount || amount <= 0) return;
  var boxId = card === G.player ? 'art-left' : 'art-right';
  var box = document.getElementById(boxId);
  if (!box) return;
  var el = document.createElement('div');
  el.className = 'dmg-popup' + (amount >= 20 ? ' dmg-big' : '');
  el.textContent = '-' + amount;
  box.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 1300);
}

function applyDamage(attacker, defender, rawDmg, isDirectHit) {
  let dmg = rawDmg;

  // Embarcación dodge (solo golpes directos)
  if (defender.name === 'Embarcación Mortal' && isDirectHit) {
    if (defender.extra.immune > 0) {
      addLog(`✨ ${defender.name} INMUNE este turno`, 'log-status');
      triggerShieldAnim(defender);
      return 0;
    }
    if (Math.random() * 100 < 45) {
      addLog(`💨 ${defender.name} ESQUIVA (45%)`, 'log-status');
      triggerShieldAnim(defender);
      return 0;
    }
  }

  // Kabum immunity — vida 1: bloquea golpes directos ≤15. vida 2: bloquea TODO daño ≤15
  if (defender.name === 'Kabum') {
    if (defender.extra.lives === 2 && dmg <= 15) {
      addLog(`🛡 Kabum (Vida 1) INMUNE — daño ≤15`, 'log-status');
      triggerShieldAnim(defender);
      return 0;
    }
    if (defender.extra.lives === 2 && dmg > 15) {
      defender.extra.lives = 1;
      defender.extra.immuneTurns = 10;
      defender.hp = 10;
      addLog(`💔 ¡KABUM pierde VIDA 1! Daño >15 → VIDA 2 activa (10T inmune)`, 'log-special');
      return dmg;
    }
    if (defender.extra.lives === 1 && !defender.extra.postExplosion && defender.extra.immuneTurns > 0) {
      addLog(`🔒 Kabum (Vida 2) INMUNE — ${defender.extra.immuneTurns}T restantes`, 'log-status');
      triggerShieldAnim(defender);
      return 0;
    }
  }

  // Giga Morror resistance
  if (defender.name === 'Giga Morror' && defender.extra.resistance > 0 && isDirectHit) {
    const reduced = Math.floor(dmg * (defender.extra.resistance / 100));
    dmg = dmg - reduced;
    if (reduced > 0) addLog(`⚡ Resist. ${defender.extra.resistance}%: -${reduced} daño`, 'log-status');
  }

  const prevHp = defender.hp;
  defender.hp = Math.max(0, defender.hp - dmg);
  const actualDmg = prevHp - defender.hp;

  // ── Número de daño flotante ──
  if (actualDmg > 0) showDamageNumber(defender, actualDmg);

  // ── Animación de impacto ──
  if (actualDmg > 0 && isDirectHit) {
    const hitOverlay = defender === G.player ? 'hit-left' : 'hit-right';
    playHitAnim(hitOverlay);
  }

  // ── Sonidos de daño según porcentaje de vida máxima ──
  if (actualDmg > 0) {
    const pct = actualDmg / defender.maxHp;
    if (pct >= 0.70)      playDmgHeavy();
    else if (pct >= 0.40) playDmgMedium();
    else if (pct >= 0.10) playDmgLight();
  }

  // Embarcación +7C al recibir golpe directo
  if (defender.name === 'Embarcación Mortal' && actualDmg > 0 && isDirectHit) {
    defender.extra.cannon += 7;
    addLog(`💥 ${defender.name} +7C por golpe (C:${defender.extra.cannon})`, 'log-status');
  }

  // Moyors power
  if (defender.name === 'Moyors' && actualDmg > 0) {
    while (defender.hp <= defender.extra.hpThreshold - 5) {
      defender.extra.atkBonus += 4;
      defender.extra.hpThreshold -= 5;
      addLog(`⚡ MOYORS +4 ATK permanente (total:+${defender.extra.atkBonus})`, 'log-special');
    }
  }

  // Pico Escudo: golpe >10 duplica RD + 5PV
  if (defender.name === 'Pico Escudo' && isDirectHit && actualDmg > 10 && !defender.extra.rdDouble) {
    defender.extra.rdDouble = true;
    defender.extra.rdDoubleTurns = 4;
    defender.hp = Math.min(defender.maxHp, defender.hp + 5);
    triggerHealAnim(defender);
    addLog(`🛡 PICO ESCUDO: golpe >10 → RD×2 (4T) +5PV`, 'log-special');
  }

  // RD reflect (solo golpes directos)
  if (defender.extra?.rd > 0 && actualDmg > 0 && isDirectHit) {
    const rdBase = defender.extra.rdDouble ? defender.extra.rd * 2 : defender.extra.rd;
    const reflect = Math.min(rdBase, actualDmg);
    // Kabum inmortal (Vida 2 con immuneTurns) no recibe reflejo
    const kabumInmortal = attacker.name === 'Kabum' &&
      attacker.extra.lives === 1 && !attacker.extra.postExplosion && attacker.extra.immuneTurns > 0;
    if (!kabumInmortal) {
      attacker.hp = Math.max(0, attacker.hp - reflect);
      if (reflect > 0) showDamageNumber(attacker, reflect);
      addLog(`🛡 RD: ${defender.name} refleja ${reflect} dmg`, 'log-status');
      if (attacker.name === 'Moyors' && reflect > 0) {
        while (attacker.hp <= attacker.extra.hpThreshold - 5) {
          attacker.extra.atkBonus += 4; attacker.extra.hpThreshold -= 5;
          addLog(`⚡ MOYORS +4 ATK (RD) (total:+${attacker.extra.atkBonus})`, 'log-special');
        }
      }
    } else {
      addLog(`🔒 Kabum inmortal — reflejo bloqueado`, 'log-status');
    }
  }

  return actualDmg;
}

// ═══════════════════════════════════════════════════════
//  USE SKILL
// ═══════════════════════════════════════════════════════
function useSkill(attacker, defender, idx, isPlayer) {
  const sk = attacker.skills[idx];
  const cost = getSkillCost(attacker, idx);
  if (attacker.pc < cost) { addLog(`❌ PC insuficientes`, 'log-system'); return false; }
  attacker.pc -= cost;
  const cls = isPlayer ? 'log-player' : 'log-enemy';
  let msg = `▶ ${attacker.name}: ${sk.name} (-${cost}PC)`;

  // ── Raka: calcular crit este turno ──
  let critMult = 1;
  if (attacker.name === 'Raka') {
    const isH3 = sk.note === 'dmgH3';
    if (isH3) {
      const vidaPerdida = attacker.maxHp - attacker.hp;
      const curacion = Math.floor(vidaPerdida * 0.65);
      if (curacion > 0) {
        attacker.hp = Math.min(attacker.maxHp, attacker.hp + curacion);
        triggerHealAnim(attacker);
        addLog(`💊 Rugido Final cura ${curacion}PV a Raka`, 'log-heal');
      }
    } else {
      const isCrit = !!attacker.extra.critThisTurn;
      if (isCrit) {
        critMult = 4;
        addLog(`🔥 ¡RAKA CRÍTICO! ×4`, 'log-special');
      }
    }
  }

  // ── Giga Morror ×1.5 al llegar a 35% resistencia ──
  const gigaMult = (attacker.name === 'Giga Morror' && attacker.extra.resistance >= 35) ? 1.5 : 1;

  // ── Helper: aplicar daño con todos los modificadores ──
  function calcAndApplyDmg(base) {
    let dmg = base;
    if (attacker.name === 'Moyors') dmg += attacker.extra.atkBonus;
    dmg = Math.floor(dmg * critMult * gigaMult);
    const act = applyDamage(attacker, defender, dmg, true);
    addLog(`  ${defender.name}: ${defender.hp}PV`, 'log-damage');
    return act;
  }

  switch (sk.effect) {

    // ── DAMAGE simple (Giga Morror H1, Kabum H3, etc.) ──
    case 'damage': {
      let base = sk.value;
      const act = calcAndApplyDmg(base);
      msg += ` → ${act} DMG`; addLog(msg, cls); break;
    }

    // ── DAMAGE + HEAL propio (Moyors todas las H) ──
    case 'damage_heal': {
      const act = calcAndApplyDmg(sk.dmg);
      const prevHp = attacker.hp;
      attacker.hp = Math.min(attacker.maxHp, attacker.hp + sk.heal);
      const healed = attacker.hp - prevHp;
      if (healed > 0) triggerHealAnim(attacker);
      msg += ` → ${act} DMG +${healed}PV`; addLog(msg, cls); break;
    }

    // ── DAMAGE + MVL (Giga Morror H2: 7G + mitad vida perdida) ──
    case 'damage_mvp': {
      const lost = attacker.maxHp - attacker.hp;
      const bonus = Math.floor(lost / 2);
      const base = sk.value + bonus;
      const act = calcAndApplyDmg(base);
      msg += ` → ${act} DMG (${sk.value}+MVP:${bonus})`; addLog(msg, cls); break;
    }

    // ── DAMAGE + TVP (Giga Morror H3: 15G + total vida perdida) ──
    case 'damage_tvp': {
      const lost = attacker.maxHp - attacker.hp;
      const base = sk.value + lost;
      const act = calcAndApplyDmg(base);
      msg += ` → ${act} DMG (${sk.value}+TVP:${lost})`; addLog(msg, cls); break;
    }

    // ── DAMAGE + RD (Pico Escudo H1/H2/H3) ──
    case 'damage_rd': {
      const act = calcAndApplyDmg(sk.dmg);
      attacker.extra.rd += sk.rd;
      msg += ` → ${act} DMG +${sk.rd}RD (RD total:${attacker.extra.rd})`; addLog(msg, cls); break;
    }

    // ── DAMAGE + HEAL (Pico Escudo H4: 15G +25V) ──
    // Nota: damage_heal ya existe para Moyors; Pico Escudo H4 usa misma lógica
    // pero para Pico Escudo el heal no tiene cap extra, reutilizamos damage_heal

    // ── POISON solo (Carno Plant H2) ──
    case 'poison': {
      defender.poison += sk.poison;
      msg += ` → +${sk.poison}Ve (total rival:${defender.poison})`; addLog(msg, cls); break;
    }

    // ── DAMAGE + POISON (Carno Plant H1: 5G +1Ve) ──
    case 'poison_dmg': {
      const act = calcAndApplyDmg(sk.dmg);
      defender.poison += sk.poison;
      msg += ` → ${act} DMG +${sk.poison}Ve (total rival:${defender.poison})`; addLog(msg, cls); break;
    }

    // ── DAMAGE + MULTIPLICAR VENENO (Carno Plant H3: 5G +Ve×1.5/3.5) ──
    case 'dmg_mult_poison': {
      const act = calcAndApplyDmg(sk.dmg);
      const mult = attacker.extra.h3Mult;
      const prevVe = defender.poison;
      defender.poison = Math.floor(defender.poison * mult);
      msg += ` → ${act} DMG + Ve:${prevVe}×${mult}=${defender.poison}`; addLog(msg, cls); break;
    }

    // ── KABUM HEAL sin tope (H1/H2) ──
    case 'kabum_heal': {
      attacker.hp += sk.value;
      if (attacker.hp > attacker.maxHp) attacker.maxHp = attacker.hp;
      triggerHealAnim(attacker);
      msg += ` → +${sk.value}PV (${attacker.hp}PV)`; addLog(msg, cls); break;
    }

    // ── KABUM DETONAR MANUAL (H3: exactamente 15G) ──
    case 'kabum_manual_explode': {
      const act = applyDamage(attacker, defender, sk.value, true);
      msg += ` → ${act} DMG`; addLog(msg, cls);
      addLog(`  ${defender.name}: ${defender.hp}PV`, 'log-damage'); break;
    }

    // ── CANNON acumular solo (Embarcación H3) ──
    case 'cannon': {
      attacker.extra.cannon += sk.cannon;
      msg += ` → +${sk.cannon}C (total:${attacker.extra.cannon})`; addLog(msg, cls); break;
    }

    // ── DAMAGE + CANNON acumular (Embarcación H1/H2) ──
    case 'damage_cannon': {
      const act = calcAndApplyDmg(sk.dmg);
      attacker.extra.cannon += sk.cannon;
      msg += ` → ${act} DMG +${sk.cannon}C (total:${attacker.extra.cannon})`; addLog(msg, cls); break;
    }

    // ── CANNON FIRE: 10G + todos los cañones (Embarcación H4) ──
    case 'cannon_fire': {
      const base = sk.dmg + attacker.extra.cannon;
      const prevC = attacker.extra.cannon;
      attacker.extra.cannon = 0;
      const act = calcAndApplyDmg(base);
      msg += ` → ¡FUEGO! ${sk.dmg}+${prevC}C = ${act} DMG`;
      addLog(msg, cls); break;
    }

    // ── SUCCIÓN DE VIDA (Booly H1/H2/H3: Xg + roba PV) ──
    case 'sv': {
      const actDmg = calcAndApplyDmg(sk.dmg);
      const kabumProtegido = defender.name === 'Kabum' && (
        defender.extra.lives === 2 ||
        (defender.extra.lives === 1 && !defender.extra.postExplosion && defender.extra.immuneTurns > 0)
      );
      const embarcacionInmune = defender.name === 'Embarcación Mortal' && defender.extra.immune > 0;
      if (kabumProtegido) {
        msg += ` → ${actDmg} DMG (Kabum protegido — succión bloqueada)`;
        addLog(msg, cls); break;
      }
      if (embarcacionInmune) {
        msg += ` → ${actDmg} DMG (Embarcación INMUNE — succión bloqueada)`;
        addLog(msg, cls); break;
      }
      const stolen = Math.min(defender.hp, sk.value);
      defender.hp = Math.max(0, defender.hp - stolen);
      attacker.extra.stored += stolen;
      msg += ` → ${actDmg} DMG + Succiona ${stolen}PV (SV acumulado:${attacker.extra.stored})`;
      addLog(msg, cls);
      addLog(`  ${defender.name}: ${defender.hp}PV`, 'log-damage'); break;
    }

    // ── DESCARGA TDS (Booly H4: 1G + todo SV) ──
    case 'tds': {
      const total = sk.dmg + attacker.extra.stored;
      const prevSV = attacker.extra.stored;
      attacker.extra.stored = 0;
      const act = calcAndApplyDmg(total);
      msg += ` → DESCARGA ${sk.dmg}+${prevSV}SV = ${act} DMG`;
      addLog(msg, cls); break;
    }
  }

  // ── Embarcación H4: inmunidad 4 turnos ──
  if (attacker.name === 'Embarcación Mortal' && sk.effect === 'cannon_fire') {
    attacker.extra.immune = 4;
    addLog(`✨ ${attacker.name} INMUNE próximos 4 turnos`, 'log-special');
  }

  // ── Carno Plant H4: reducir costo y escalar H3 ──
  if (attacker.name === 'Carno Plant' && idx === 3) {
    attacker.extra.h4Used++;
    if (attacker.extra.h4Used === 1) {
      addLog(`🌿 CARNO PLANT: H4 ahora cuesta 7PC`, 'log-special');
    }
    if (attacker.extra.h4Used === 2) {
      attacker.extra.h3Mult = 3;
      addLog(`🌿 CARNO PLANT: H3 ahora multiplica veneno ×3`, 'log-special');
    }
  }

  return true;
}

// ═══════════════════════════════════════════════════════
//  START OF TURN EFFECTS
// ═══════════════════════════════════════════════════════
function applyTurnEffects(card, isPlayer) {
  // Poison (se ejecuta cada 2 turnos propios — poisonTick por carta)
  if (card.poison > 0) {
    card.poisonTick = (card.poisonTick || 0) + 1;
    if (card.poisonTick % 2 === 0) {
      const kabumInmortal = card.name === 'Kabum' && (
        card.extra.lives === 2 ||
        (card.extra.lives === 1 && !card.extra.postExplosion && card.extra.immuneTurns > 0)
      );
      const embarcacionInmune = card.name === 'Embarcación Mortal' && card.extra.immune > 0;
      if (kabumInmortal) {
        addLog(`🔒 Kabum inmortal — veneno bloqueado`, 'log-status');
      } else if (embarcacionInmune) {
        addLog(`✨ Embarcación INMUNE — veneno bloqueado (${card.extra.immune}T restantes)`, 'log-status');
      } else {
        card.hp = Math.max(0, card.hp - card.poison);
        addLog(`☠ ${card.name} sufre ${card.poison} veneno (${card.hp}PV)`, 'log-status');
      }
    } else {
      addLog(`☠ ${card.name} tiene veneno ${card.poison} — próximo tick`, 'log-status');
    }
  }

  // Carno Plant +3PV
  if (card.name === 'Carno Plant') {
    card.hp += 3; card.maxHp = Math.max(card.maxHp, card.hp);
    triggerHealAnim(card);
    addLog(`🌿 CARNO PLANT +3PV (${card.hp}PV)`, 'log-heal');
  }

  // Giga Morror resistance (cada 2 turnos propios)
  if (card.name === 'Giga Morror') {
    card.extra.resistTurns++;
    if (card.extra.resistTurns % 2 === 0) {
      card.extra.resistance = card.extra.resistance === 0 ? 20 : card.extra.resistance + 5;
      addLog(`⚡ GIGA MORROR Resistencia → ${card.extra.resistance}%`, 'log-special');
      if (card.extra.resistance >= 35) { card.extra.dmgMult = 1.5; addLog(`⚡ ¡Daño ×1.5 activado!`, 'log-special'); }
    }
  }

  // Pico Escudo RD doble
  if (card.name === 'Pico Escudo' && card.extra.rdDouble) {
    card.extra.rdDoubleTurns--;
    if (!card.extra.hitLastTurn) {
      card.hp = Math.min(card.maxHp, card.hp + 10);
      triggerHealAnim(card);
      addLog(`🛡 PICO ESCUDO sin golpe → +10PV`, 'log-heal');
    }
    card.extra.hitLastTurn = false;
    if (card.extra.rdDoubleTurns <= 0) { card.extra.rdDouble = false; addLog(`🛡 RD×2 expirado`, 'log-status'); }
  }

  // Embarcación inmunidad countdown
  if (card.name === 'Embarcación Mortal' && card.extra.immune > 0) {
    card.extra.immune--;
    if (card.extra.immune === 0) addLog(`✨ Inmunidad Embarcación expira`, 'log-status');
  }

  // Kabum cuenta regresiva explosión
  if (card.name === 'Kabum' && card.extra.lives === 1 && !card.extra.postExplosion) {
    card.extra.immuneTurns--;
    if (card.extra.immuneTurns > 0) {
      addLog(`💣 Kabum: ${card.extra.immuneTurns}T hasta EXPLOSIÓN`, 'log-special');
    } else {
      card.extra.postExplosion = true;
      const opp = isPlayer ? G.enemy : G.player;
      const prev = opp.hp;
      opp.hp = Math.max(0, opp.hp - 60);
      addLog(`💥 ¡KABUM EXPLOTA! ${prev - opp.hp} DMG inbloqueable (${opp.hp}PV)`, 'log-special');
    }
  }
}

// ═══════════════════════════════════════════════════════
//  TURN FLOW
// ═══════════════════════════════════════════════════════
function playerUseSkill(idx) {
  // En PvP también se usa para el turno del J2 (enemy)
  const isPvPEnemy = G_PVP && G.turn === 'enemy';
  if (!isPvPEnemy && G.turn !== 'player') return;
  if (!G.diceRolled) return;
  playPiki();

  if (G.turn === 'player') {
    if (!useSkill(G.player, G.enemy, idx, true)) return;
    if (G.enemy.extra) G.enemy.extra.hitLastTurn = true;
    if (checkDeath()) return;
    endPlayerTurn();
  } else {
    // PvP: turno del J2 (enemy)
    if (!useSkill(G.enemy, G.player, idx, false)) return;
    if (G.player.extra) G.player.extra.hitLastTurn = true;
    if (checkDeath()) return;
    endEnemyTurnPvP();
  }
}

function endPlayerTurn() {
  G.diceRolled = false; G.turn = 'enemy'; G.turnNum++;
  applyTurnEffects(G.enemy, false);
  if (checkDeath()) return;
  renderUI();
  // En PvP no ejecutar IA — el J2 actúa manualmente
  if (!G_PVP) setTimeout(enemyTurn, 900);
}

function endEnemyTurnPvP() {
  // Fin del turno del J2 en modo PvP
  G.turn = 'player'; G.diceRolled = false;
  applyTurnEffects(G.player, true);
  if (checkDeath()) return;
  if (G.turnNum === G.turnLimit - 4) {
    addLog(`⏳ ¡ALERTA! Quedan ${G.turnLimit - G.turnNum + 1} turnos. ¡El empate se acerca!`, 'log-system');
  }
  if (G.turnNum > G.turnLimit) { if (checkDeath()) return; }
  renderUI();
}

function enemyTurn() {
  if (G.turn !== 'enemy') return;
  const val = Math.floor(Math.random() * 6) + 1;
  let pcGain = val;

  if (G.enemy.name === 'Raka') {
    const isCrit = Math.random() * 100 < G.enemy.extra.critChance;
    G.enemy.extra.critThisTurn = isCrit;
    if (isCrit) { pcGain = val * 3; addLog(`🎲 IA dado ${val} → ¡RAKA! ×3PC +${pcGain}PC`, 'log-enemy'); }
    else { G.enemy.extra.critThisTurn = false; addLog(`🎲 IA dado ${val} → +${pcGain}PC`, 'log-enemy'); }
  } else {
    addLog(`🎲 IA dado ${val} → +${pcGain}PC`, 'log-enemy');
  }
  G.enemy.pc += pcGain;
  renderUI();

  setTimeout(() => {
    const action = aiDecide(G.enemy, G.player);
    if (action === 'save') addLog(`💾 IA guarda PC (${G.enemy.pc}PC)`, 'log-enemy');
    else if (action !== null) {
      useSkill(G.enemy, G.player, action, false);
      if (G.player.extra) G.player.extra.hitLastTurn = true;
      if (checkDeath()) return;
    }
    endEnemyTurn();
  }, 700);
}

function endEnemyTurn() {
  G.turn = 'player'; G.diceRolled = false;
  applyTurnEffects(G.player, true);
  if (checkDeath()) return;
  if (G.turnNum === G.turnLimit - 4) {
    addLog(`⏳ ¡ALERTA! Quedan ${G.turnLimit - G.turnNum + 1} turnos. ¡El empate se acerca!`, 'log-system');
  }
  if (G.turnNum > G.turnLimit) { if (checkDeath()) return; }
  renderUI();
}

// ═══════════════════════════════════════════════════════
//  AI
// ═══════════════════════════════════════════════════════
function aiDecide(ai, player) {
  const affordable = ai.skills.map((sk,i) => ({i, cost: getSkillCost(ai,i)})).filter(x => ai.pc >= x.cost);
  if (!affordable.length) return 'save';
  const hpPct = ai.hp / ai.maxHp;
  const ePct  = player.hp / player.maxHp;

  switch (ai.name) {
    case 'Moyors': {
      // Prefiere H4 (más daño), pero H2/H3 dan más curación
      if (affordable.find(x=>x.i===3)) return 3;
      if (affordable.find(x=>x.i===2) && hpPct < 0.5) return 2; // más curación
      if (affordable.find(x=>x.i===2)) return 2;
      if (affordable.find(x=>x.i===1)) return 1;
      return affordable[0].i;
    }
    case 'Raka': {
      if (affordable.find(x=>x.i===2)) return 2; // H3: máximo daño
      if (affordable.find(x=>x.i===1)) return 1; // H2
      if (affordable.find(x=>x.i===0)) return 0; // H1
      return 'save';
    }
    case 'Giga Morror': {
      if (affordable.find(x=>x.i===2) && ai.pc >= 15) return 2; // TVP
      if (affordable.find(x=>x.i===1) && ai.pc >= 7)  return 1; // MVP
      return 0; // H1 gratis siempre
    }
    case 'Carno Plant': {
      // Prioridad: acumular veneno, luego dispararlo, luego daño directo
      if (player.poison >= 6 && affordable.find(x=>x.i===2)) return 2; // multiplicar veneno
      if (affordable.find(x=>x.i===3)) return 3; // H4 daño alto
      if (affordable.find(x=>x.i===1)) return 1; // nube veneno
      return affordable[0].i;
    }
    case 'Pico Escudo': {
      // H3 cura bastante si tiene poca vida; siempre acumular RD
      if (hpPct < 0.4 && affordable.find(x=>x.i===3)) return 3; // H4: daño+curar
      if (affordable.find(x=>x.i===2)) return 2; // H3: mayor RD+daño
      if (affordable.find(x=>x.i===1)) return 1; // H2
      return affordable[0].i; // H1
    }
    case 'Embarcación Mortal': {
      // Agresiva: dispara con 8+ cañones, alterna daño y carga, nunca guarda sin atacar
      if (ai.extra.cannon >= 8 && affordable.find(x=>x.i===3)) return 3;  // Fuego Total a partir de 8C
      if (affordable.find(x=>x.i===1)) return 1;  // Cañonazo II: daño + acumula C
      if (affordable.find(x=>x.i===2)) return 2;  // Cargar Cañón solo si no puede H2
      if (affordable.find(x=>x.i===0)) return 0;  // Cañonazo I como último recurso
      return 'save';
    }
    case 'Kabum': {
      // Prioridad: curar si hp bajo, atacar si puede, sino guardar
      const canHeal2 = affordable.find(x=>x.i===1); // Absorber II (15PV, 8PC)
      const canHeal1 = affordable.find(x=>x.i===0); // Absorber I (10PV, 5PC)
      const canAtk   = affordable.find(x=>x.i===2); // Detonar (15DMG, 10PC)
      if (hpPct < 0.5 && canHeal2) return 1;
      if (hpPct < 0.7 && canHeal1) return 0;
      if (canAtk) return 2;
      if (canHeal2) return 1;
      if (canHeal1) return 0;
      return 'save';
    }
    case 'Booly': {
      if (ai.extra.stored >= 30 && affordable.find(x=>x.i===3)) return 3; // DESCARGA
      if (affordable.find(x=>x.i===2)) return 2; // Maelstrom: más SV
      if (affordable.find(x=>x.i===1)) return 1; // Chupar II
      return affordable[0].i;
    }
  }
  return affordable[affordable.length-1].i;
}

// ─── SONIDO: WUPWUP (botón INICIAR) ────────────────────
function playWupWup() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.13].forEach(function(t) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(180, ctx.currentTime + t);
      osc.frequency.exponentialRampToValueAtTime(420, ctx.currentTime + t + 0.09);
      gain.gain.setValueAtTime(0.0, ctx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0.65, ctx.currentTime + t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.11);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.12);
    });
    setTimeout(() => ctx.close(), 500);
  } catch(e) {}
}

// ─── SONIDO: TRICK (clicks generales) ──────────────────
function playTrick() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 4);
    var src = ctx.createBufferSource(); src.buffer = buf;
    var hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 900;
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0.715, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.055);
    var osc = ctx.createOscillator(); osc.type = 'square';
    osc.frequency.setValueAtTime(520, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(260, ctx.currentTime + 0.04);
    var oscG = ctx.createGain();
    oscG.gain.setValueAtTime(0.156, ctx.currentTime);
    oscG.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
    src.connect(hp); hp.connect(gain); gain.connect(ctx.destination);
    osc.connect(oscG); oscG.connect(ctx.destination);
    src.start(); osc.start(); osc.stop(ctx.currentTime + 0.05);
    setTimeout(() => ctx.close(), 400);
  } catch(e) {}
}

    var lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2200;
    var noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(1.82, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    // Oscilador grave que cae rápido
    var osc = ctx.createOscillator(); osc.type = 'square';
    osc.frequency.setValueAtTime(280, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.12);

    sub.frequency.exponentialRampToValueAtTime(40, t + 0.15);

    src.connect(lp); lp.connect(noiseGain); noiseGain.connect(ctx.destination);

    sub.connect(subGain); subGain.connect(ctx.destination);
    src.start(t); osc.start(t); sub.start(t);
    osc.stop(t + 0.14); sub.stop(t + 0.16);
    setTimeout(() => ctx.close(), 600);
  } catch(e) {}
}

function playDmgMedium() {

    // Ruido con caída exponencial más lenta = más cuerpo
    var dur = 0.38;
    var buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.4);
    var src = ctx.createBufferSource(); src.buffer = buf;
    var lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1400;
    var noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(2.6, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    // Oscilador medio que barre hacia abajo
    var osc = ctx.createOscillator(); osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(320, t);
    osc.frequency.exponentialRampToValueAtTime(55, t + 0.28);
    var oscG = ctx.createGain();
    oscG.gain.setValueAtTime(1.43, t);
    oscG.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    // Sub punch
    var sub = ctx.createOscillator(); sub.type = 'sine';
    sub.frequency.setValueAtTime(90, t);
    sub.frequency.exponentialRampToValueAtTime(28, t + 0.3);
    var subG = ctx.createGain();
    subG.gain.setValueAtTime(1.69, t);
    subG.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    src.connect(lp); lp.connect(noiseGain); noiseGain.connect(ctx.destination);
    osc.connect(oscG); oscG.connect(ctx.destination);
    sub.connect(subG); subG.connect(ctx.destination);
    src.start(t); osc.start(t); sub.start(t);
    osc.stop(t + 0.29); sub.stop(t + 0.31);
    setTimeout(() => ctx.close(), 900);
  } catch(e) {}
}

// ─── SONIDO: EXPLOSIÓN (daño masivo, >70% HP) ──────────
function playDmgHeavy() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var t = ctx.currentTime;
    var dur = 1.1;
    // Ruido blanco con ataque agresivo y cola larga
    var buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 0.9);
    var src = ctx.createBufferSource(); src.buffer = buf;
    var lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 800;
    lp.frequency.exponentialRampToValueAtTime(120, t + dur);
    var noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(3.64, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    // Sub boom profundo
    var sub = ctx.createOscillator(); sub.type = 'sine';
    sub.frequency.setValueAtTime(100, t);
    sub.frequency.exponentialRampToValueAtTime(18, t + 0.8);
    var subG = ctx.createGain();
    subG.gain.setValueAtTime(2.86, t);
    subG.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    // Mid crunch
    var mid = ctx.createOscillator(); mid.type = 'sawtooth';
    mid.frequency.setValueAtTime(180, t);
    mid.frequency.exponentialRampToValueAtTime(35, t + 0.55);
    var midG = ctx.createGain();
    midG.gain.setValueAtTime(1.82, t);
    midG.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
    // Segundo transiente de ruido más agudo al inicio = "crack"
    var buf2 = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
    var d2 = buf2.getChannelData(0);
    for (var j = 0; j < d2.length; j++) d2[j] = (Math.random() * 2 - 1);
    var src2 = ctx.createBufferSource(); src2.buffer = buf2;
    var hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 3000;
    var crackGain = ctx.createGain();
    crackGain.gain.setValueAtTime(2.34, t);
    crackGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    src.connect(lp); lp.connect(noiseGain); noiseGain.connect(ctx.destination);
    sub.connect(subG); subG.connect(ctx.destination);
    mid.connect(midG); midG.connect(ctx.destination);
    src2.connect(hp); hp.connect(crackGain); crackGain.connect(ctx.destination);
    src.start(t); sub.start(t); mid.start(t); src2.start(t);
    sub.stop(t + 0.85); mid.stop(t + 0.6);
    setTimeout(() => ctx.close(), 1800);
  } catch(e) {}
}

// ─── SONIDO: VIDRIO ROMPIÉNDOSE ────────────────────────
function playGlassBreak() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();

    function burst(startTime, freq, dur, vol) {
      // Transiente de impacto: ruido blanco filtrado
      var bufSize = ctx.sampleRate * dur;
      var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      var data = buf.getChannelData(0);
      for (var i = 0; i < bufSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 1.5);
      }
      var src = ctx.createBufferSource();
      src.buffer = buf;

      // Filtro paso-alto para textura de vidrio (brillante y agudo)
      var hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = freq;
      hp.Q.value = 0.8;

      // Filtro paso-banda adicional para armónicos de cristal
      var bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = freq * 2.5;
      bp.Q.value = 3;

      var gain = ctx.createGain();
      gain.gain.setValueAtTime(vol, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + dur);

      src.connect(hp);
      hp.connect(bp);
      bp.connect(gain);
      gain.connect(ctx.destination);
      src.start(startTime);
    }

    // Golpe inicial (impacto)
    burst(ctx.currentTime,        1800, 0.234, 1.2);
    // Fragmentos cayendo (escalonados)
    burst(ctx.currentTime + 0.05, 3200, 0.286, 0.7);
    burst(ctx.currentTime + 0.10, 2600, 0.364, 0.5);
    burst(ctx.currentTime + 0.16, 4000, 0.234, 0.4);
    burst(ctx.currentTime + 0.22, 2200, 0.39, 0.3);
    burst(ctx.currentTime + 0.30, 5000, 0.26, 0.2);

    // Tono resonante de cristal (ring)
    var osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1100, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.6);
    var oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(0.195, ctx.currentTime);
    oscGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.connect(oscGain);
    oscGain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.6);

    setTimeout(() => ctx.close(), 1200);
  } catch(e) {}
}
